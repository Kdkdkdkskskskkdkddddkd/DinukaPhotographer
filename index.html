<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinuka Photographer | Premium Photography Services</title>
    <meta name="description" content="Capture your most precious moments with Dinuka Photographer. Premium wedding, engagement, and portrait photography services.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header will be injected here by components.js -->
    <div id="header-placeholder"></div>

    <section class="hero" style="background-image: url('assets/images/hero_bg_1773070689052.png');">
        <div class="hero-content">
            <h1>Capture The Moment</h1>
            <p>Timeless Elegance & Premium Photography</p>
            <a href="#services" class="btn">Explore Services</a>
        </div>
    </section>

    <section id="services" class="section">
        <div class="section-title">
            <span>Our Offerings</span>
            <h2>Photography Packages</h2>
        </div>
        
        <div class="services-grid">
            <div class="service-card" onclick="window.location.href='wedding.html'">
                <img src="assets/images/wedding_photo_1773070715703.png" alt="Wedding Photography">
                <div class="service-overlay">
                    <h3>Wedding</h3>
                    <p>Discover &rarr;</p>
                </div>
            </div>

            <div class="service-card" onclick="window.location.href='homecoming.html'">
                <img src="assets/images/homecoming_photo_1773070884088.png" alt="Homecoming Photography">
                <div class="service-overlay">
                    <h3>Homecoming</h3>
                    <p>Discover &rarr;</p>
                </div>
            </div>

            <div class="service-card" onclick="window.location.href='engagement.html'">
                <img src="assets/images/engagement_photo_1773071111330.png" alt="Engagement Photography">
                <div class="service-overlay">
                    <h3>Engagement</h3>
                    <p>Discover &rarr;</p>
                </div>
            </div>

            <div class="service-card" onclick="window.location.href='casual.html'">
                <img src="assets/images/casual_photo_1773071143662.png" alt="Casual Portrait">
                <div class="service-overlay">
                    <h3>Casual Portrait</h3>
                    <p>Discover &rarr;</p>
                </div>
            </div>

            <div class="service-card" onclick="window.location.href='birthday.html'">
                <img src="assets/images/birthday_photo_1773070782052.png" alt="Birthday Shoot">
                <div class="service-overlay">
                    <h3>Birthday Shoot</h3>
                    <p>Discover &rarr;</p>
                </div>
            </div>

            <div class="service-card" onclick="window.location.href='extras.html'">
                <img src="assets/images/hero_bg_1773070689052.png" alt="Extras">
                <div class="service-overlay">
                    <h3>Extras</h3>
                    <p>Discover &rarr;</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer will be injected here by components.js -->
    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
</body>
</html>
